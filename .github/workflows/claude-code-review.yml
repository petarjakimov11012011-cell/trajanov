name: Claude Code Review

# Automatic PR reviewer for Trajanov — the Part 1 hard gate.
# Runs on every pull request to `main` and posts review feedback as comments.
#
# Auth: add ONE of these repository secrets
# (Settings → Secrets and variables → Actions → New repository secret):
#   - CLAUDE_CODE_OAUTH_TOKEN  — from a Claude subscription (`claude setup-token`)
#   - ANTHROPIC_API_KEY        — a pay-as-you-go key from console.anthropic.com
# The workflow accepts either. Until one is set, the review step is SKIPPED
# (the job succeeds with a warning) rather than failing on every PR.
#
# Recommended: install the Claude GitHub App (https://github.com/apps/claude) on
# this repo so review comments post as "claude" and @claude mentions work later.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check that a Claude auth secret is configured
        id: auth
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH_TOKEN" ] || [ -n "$API_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Claude review skipped::No CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY secret set yet — add one to enable automatic review."
          fi

      - name: Checkout repository
        if: steps.auth.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        if: steps.auth.outputs.configured == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          # Whichever secret you set is used; the empty one is ignored.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Visual progress tracking on the PR while the review runs.
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Follow the repository's CLAUDE.md
            conventions and the phase brief under `briefs/` when judging scope.
            Focus on:
            1. Correctness — bugs, unhandled edge cases, broken behavior.
            2. Security — input handling, secrets, auth. Flag any committed secret.
            3. Quality — readability, maintainability, dead code, simplifications.
            4. Consistency — does the change match the project's stated stack,
               structure (file-map.md), and decisions (decisions.md)?

            Leave specific issues as inline comments and a short summary as a
            top-level comment. Tag anything that should block merge clearly.
            If nothing is blocking, say so plainly.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
